# 🔄 TallyIO Automated Dependency Updates
# Single unified configuration to minimize workflow runs

version: 2

updates:
  # 🦀 Rust dependencies (Primary ecosystem)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"

    # 🎯 Minimal PRs strategy
    open-pull-requests-limit: 1

    # 🏷️ PR configuration
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"

    # 📋 Labels
    labels:
      - "dependencies"
      - "rust"
      - "automated"

    # 🔍 Allow specific dependency types
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

    # 🚨 Ignore major version updates for critical dependencies
    ignore:
      # Core async runtime - major updates need careful review
      - dependency-name: "tokio"
        update-types: ["version-update:semver-major"]

      # Database driver - major updates need migration planning
      - dependency-name: "sqlx"
        update-types: ["version-update:semver-major"]

      # Blockchain libraries - major updates need thorough testing
      - dependency-name: "ethers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "web3"
        update-types: ["version-update:semver-major"]

    # 📦 Single group for ALL updates (maximum batching)
    groups:
      all-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"

  # 🔧 GitHub Actions (Quarterly updates only)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: 15
      time: "09:00"
      timezone: "UTC"

    open-pull-requests-limit: 1

    commit-message:
      prefix: "ci"
      include: "scope"

    labels:
      - "dependencies"
      - "github-actions"
      - "automated"

    # 📦 Batch all GitHub Actions updates
    groups:
      github-actions-updates:
        patterns:
          - "*"
