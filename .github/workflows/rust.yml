name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: |
        cargo clippy --all-targets --all-features -- -D warnings
        cargo clippy --all-targets --all-features -- -D clippy::pedantic
        cargo clippy --all-targets --all-features -- -D clippy::nursery

    - name: Run tests
      run: cargo test --all -- --nocapture

    - name: Check documentation
      run: |
        cargo doc --no-deps --document-private-items
        cargo test --doc

    - name: Install cargo-udeps
      run: |
        cargo install cargo-udeps --locked
        echo "$(dirname $(which cargo-udeps))" >> $GITHUB_PATH

    - name: Check for unused dependencies
      run: cargo udeps --all-targets --all-features

    - name: Install cargo-audit
      run: |
        cargo install cargo-audit --features=fix --locked
        echo "$(dirname $(which cargo-audit))" >> $GITHUB_PATH

    - name: Check for security vulnerabilities
      run: cargo audit --deny warnings

    - name: Check for outdated dependencies
      run: cargo outdated -R

  test-coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: llvm-tools-preview

    - name: Install cargo-tarpaulin
      uses: actions-rs/install@v0.1
      with:
        crate: cargo-tarpaulin
        version: '0.27.0'

    - name: Run tests with coverage
      run: cargo tarpaulin --out Html --output-dir target/tarpaulin

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./target/tarpaulin/tarpaulin-report.html
        fail_ci_if_error: false
