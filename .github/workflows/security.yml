name: 🔒 Security & Dependency Audit
# 🔄 This security pipeline mirrors the local scripts/quick-check.ps1 security checks

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  schedule:
    # Run daily security checks at 3 AM UTC
    - cron: '0 3 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  # 🔍 Dependency Audit
  dependency-audit:
    name: 🔍 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 📥 Install cargo-audit
        run: cargo install cargo-audit

      - name: 🔍 Run dependency audit (with known issues ignored)
        run: |
          echo "🔒 Running security audit..."
          echo "Note: Ignoring known issues waiting for upstream fixes:"
          echo "  - RUSTSEC-2023-0071: RSA Marvin Attack (no fix available)"
          echo "  - RUSTSEC-2024-0421: idna (waiting for web3 update)"
          echo "  - RUSTSEC-2025-0009: ring (waiting for ethers update)"
          echo "  - RUSTSEC-2025-0010: ring unmaintained (now maintained by rustls)"
          echo "  - RUSTSEC-2024-0384: instant unmaintained (used by ethers)"
          cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0421 --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2025-0010 --ignore RUSTSEC-2024-0384

      - name: 📊 Generate audit report
        run: |
          cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0421 --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2025-0010 --ignore RUSTSEC-2024-0384 --format json > audit-report.json
          echo "📋 Audit Summary:"
          cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0421 --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2025-0010 --ignore RUSTSEC-2024-0384 --format json | jq '.vulnerabilities | length' | xargs echo "Vulnerabilities found:"

      - name: 📤 Upload audit report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-audit-report
          path: audit-report.json

  # 🔒 License Compliance
  license-check:
    name: 🔒 License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 📥 Install cargo-license
        run: cargo install cargo-license

      - name: 📋 Check licenses
        run: |
          echo "📋 Checking dependency licenses..."
          cargo license --json > licenses.json

          # Check for problematic licenses
          PROBLEMATIC_LICENSES="GPL-3.0,AGPL-3.0,LGPL-3.0"
          if cargo license | grep -E "$PROBLEMATIC_LICENSES"; then
            echo "❌ Found problematic licenses!"
            exit 1
          fi
          echo "✅ All licenses are compatible"

      - name: 📤 Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: licenses.json

  # 🔍 Code Security Scan
  security-scan:
    name: 🔍 Security Code Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 📥 Install cargo-geiger
        run: cargo install cargo-geiger

      - name: 🔍 Run unsafe code detection
        run: |
          echo "🔍 Scanning for unsafe code blocks..."
          cargo geiger --format GitHubMarkdown > geiger-report.md

          # Check if unsafe code is properly documented
          UNSAFE_COUNT=$(cargo geiger --format json | jq '.packages[].unsafeInfo.used.functions + .packages[].unsafeInfo.used.exprs + .packages[].unsafeInfo.used.itemImpls + .packages[].unsafeInfo.used.itemTraits + .packages[].unsafeInfo.used.methods' | jq -s 'add')

          if [ "$UNSAFE_COUNT" -gt 0 ]; then
            echo "⚠️ Found $UNSAFE_COUNT unsafe code blocks"
            echo "Please ensure all unsafe code is properly documented and justified"
          else
            echo "✅ No unsafe code detected"
          fi

      - name: 📤 Upload security scan report
        uses: actions/upload-artifact@v3
        with:
          name: security-scan-report
          path: geiger-report.md

  # 🔍 Supply Chain Security
  supply-chain:
    name: 🔍 Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 📥 Install cargo-deny
        run: cargo install cargo-deny

      - name: 🔍 Run supply chain checks
        run: |
          echo "🔍 Running supply chain security checks..."
          # Use existing deny.toml configuration
          cargo deny check

  # 🔒 Secrets Detection
  secrets-scan:
    name: 🔒 Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # 📊 Security Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, license-check, security-scan, supply-chain, secrets-scan]
    if: always()
    steps:
      - name: 📊 Generate security summary
        run: |
          echo "🔒 TallyIO Security Audit Summary"
          echo "================================="
          echo "Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "License Check: ${{ needs.license-check.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Supply Chain: ${{ needs.supply-chain.result }}"
          echo "Secrets Scan: ${{ needs.secrets-scan.result }}"

          if [[ "${{ needs.dependency-audit.result }}" == "success" &&
                "${{ needs.license-check.result }}" == "success" &&
                "${{ needs.security-scan.result }}" == "success" &&
                "${{ needs.supply-chain.result }}" == "success" &&
                "${{ needs.secrets-scan.result }}" == "success" ]]; then
            echo "✅ All security checks passed!"
          else
            echo "❌ Some security checks failed!"
            exit 1
          fi
