name: 🚀 TallyIO CI/CD Pipeline
# 🔄 This CI pipeline mirrors the local scripts/quick-check.ps1 for consistency
# All checks should pass both locally and in CI with identical results

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 2 AM UTC for dependency checks
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # TallyIO Performance Requirements
  TALLYIO_MAX_LATENCY_MS: 1
  TALLYIO_ZERO_PANIC: true

jobs:
  # 🔍 Code Quality & Standards
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: quality-${{ runner.os }}

      - name: 🎨 Check formatting
        run: cargo fmt --all -- --check

      - name: 📎 Run Clippy (Zero warnings policy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 🚨 TallyIO Zero Panic Check
        run: |
          echo "🔍 Checking for prohibited patterns..."
          PANIC_COUNT=$(grep -r "unwrap\|expect\|panic!\|todo!\|unimplemented!" src/ crates/ || true | wc -l)
          if [ "$PANIC_COUNT" -gt 0 ]; then
            echo "❌ Found $PANIC_COUNT prohibited patterns:"
            grep -rn "unwrap\|expect\|panic!\|todo!\|unimplemented!" src/ crates/ || true
            exit 1
          fi
          echo "✅ Zero panic policy verified"

  # 🧪 Testing Matrix
  test:
    name: 🧪 Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta, nightly]
        exclude:
          # Skip beta/nightly on non-Linux for speed
          - os: windows-latest
            rust: beta
          - os: windows-latest
            rust: nightly
          - os: macos-latest
            rust: beta
          - os: macos-latest
            rust: nightly

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-${{ matrix.rust }}

      - name: 🔧 Build all crates
        run: cargo build --all --verbose

      - name: 🧪 Run unit tests
        run: cargo test --all --lib --verbose

      - name: 🔗 Run integration tests
        run: |
          echo "🔗 Running integration tests..."
          # Check if integration tests exist, if not skip gracefully
          if find . -name "tests" -type d | grep -q .; then
            cargo test --all --test '*' --verbose
          else
            echo "✅ No integration tests found, skipping"
          fi

      - name: ⚡ Performance & Latency Tests
        run: |
          echo "⚡ Running performance tests..."
          cargo test --all --release --verbose

  # 📊 Code Coverage
  coverage:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 📥 Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: 📊 Generate coverage report (95% minimum)
        run: |
          echo "📊 Checking code coverage (95% minimum)..."
          cargo tarpaulin --all-features --workspace --timeout 120 --out xml --output-dir coverage/ --fail-under 95
          echo "✅ Code coverage meets 95% requirement"

      - name: 📤 Upload to codecov
        uses: codecov/codecov-action@v3
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: true

  # 🔒 Security Audit
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 📥 Install cargo-audit
        run: cargo install cargo-audit

      - name: 🔍 Run security audit (with known issues ignored)
        run: |
          echo "🔒 Running security audit..."
          echo "Note: Ignoring known issues waiting for upstream fixes:"
          echo "  - RUSTSEC-2023-0071: RSA Marvin Attack (no fix available)"
          echo "  - RUSTSEC-2024-0421: idna (waiting for web3 update)"
          echo "  - RUSTSEC-2025-0009: ring (waiting for ethers update)"
          echo "  - RUSTSEC-2025-0010: ring unmaintained (now maintained by rustls)"
          echo "  - RUSTSEC-2024-0384: instant unmaintained (used by ethers)"
          cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0421 --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2025-0010 --ignore RUSTSEC-2024-0384

  # 🐳 Docker Build
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔧 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tallyio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 📈 Benchmarks
  benchmarks:
    name: 📈 Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🏃 Run benchmarks
        run: |
          cargo bench --all -- --output-format json | tee benchmark_results.json

      - name: 📊 Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  # ✅ All Checks Passed
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    needs: [quality, test, coverage, security, docker]
    if: always()
    steps:
      - name: ✅ All checks passed
        if: ${{ needs.quality.result == 'success' && needs.test.result == 'success' && needs.coverage.result == 'success' && needs.security.result == 'success' && needs.docker.result == 'success' }}
        run: |
          echo "🎉 All CI checks passed successfully!"
          echo "✅ Code quality: PASSED"
          echo "✅ Tests: PASSED"
          echo "✅ Coverage: PASSED"
          echo "✅ Security: PASSED"
          echo "✅ Docker: PASSED"

      - name: ❌ Some checks failed
        if: ${{ needs.quality.result != 'success' || needs.test.result != 'success' || needs.coverage.result != 'success' || needs.security.result != 'success' || needs.docker.result != 'success' }}
        run: |
          echo "❌ Some CI checks failed:"
          echo "Code quality: ${{ needs.quality.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          exit 1
