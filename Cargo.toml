[workspace]
members = [
    "crates/core",
    "crates/blockchain", 
    "crates/liquidation",
    "crates/security",
    "crates/database",
    "crates/metrics",
    "crates/api",
    "crates/contracts",
    "crates/web-ui",
]
resolver = "2"

[workspace.dependencies]
# Performance & Concurrency
tokio = { version = "1.35", features = ["full"] }
crossbeam = "0.8"
rayon = "1.8"
parking_lot = "0.12"

# Async & Networking
reqwest = { version = "0.11", features = ["json"] }
hyper = { version = "0.14", features = ["full"] }
tungstenite = "0.20"
tokio-tungstenite = "0.20"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid"] }
redis = { version = "0.24", features = ["tokio-comp"] }

# Blockchain
ethers = "2.0"
web3 = "0.19"

# Crypto
sha3 = "0.10"
secp256k1 = "0.28"

# Monitoring
prometheus = "0.13"
tracing = "0.1"
tracing-subscriber = "0.3"

# Memory Management
jemallocator = "0.5"

# Time
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
debug = true
opt-level = 1
