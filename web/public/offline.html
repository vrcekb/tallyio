<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0ea5e9">
  <title>TallyIO - Brez povezave</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/logo192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f9fafb;
      color: #1e293b;
      text-align: center;
      padding: 0 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
      color: #64748b;
    }
    
    .button {
      display: inline-block;
      background-color: #0ea5e9;
      color: white;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: #0284c7;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0f172a;
        color: #f8fafc;
      }
      
      p {
        color: #94a3b8;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo192.png" alt="TallyIO Logo" class="logo">
    
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
    
    <h1>Brez internetne povezave</h1>
    <p>Trenutno nimate internetne povezave. Nekatere funkcije aplikacije morda ne bodo delovale pravilno. Preverite svojo povezavo in poskusite znova.</p>
    
    <a href="/" class="button">Poskusi znova</a>
  </div>
  
  <script>
    // Preveri, ali je spletna povezava na voljo
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
    
    // Poslušaj klik na gumb
    document.querySelector('.button').addEventListener('click', (e) => {
      e.preventDefault();
      if (navigator.onLine) {
        window.location.href = '/';
      } else {
        alert('Še vedno nimate internetne povezave. Preverite svojo povezavo in poskusite znova.');
      }
    });
  </script>
</body>
</html>
